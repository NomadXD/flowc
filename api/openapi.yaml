components:
    schemas:
        APIListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/APIResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        APIPutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/APISpec'
            required:
                - spec
            type: object
        APIResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/APISpec'
                status:
                    $ref: '#/components/schemas/APIStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        APISpec:
            properties:
                apiType:
                    type: string
                context:
                    type: string
                description:
                    type: string
                displayName:
                    type: string
                policyChain:
                    items:
                        $ref: '#/components/schemas/PolicyInstance'
                    type: array
                routing:
                    $ref: '#/components/schemas/RoutingConfig'
                specContent:
                    type: string
                upstream:
                    $ref: '#/components/schemas/UpstreamConfig'
                version:
                    type: string
            required:
                - version
                - context
                - upstream
            type: object
        APIStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                parsedInfo:
                    $ref: '#/components/schemas/ParsedInfo'
                phase:
                    type: string
            required:
                - phase
            type: object
        AccessLogsConfig:
            properties:
                enabled:
                    type: boolean
                format:
                    type: string
                path:
                    type: string
            required:
                - enabled
            type: object
        ApplyRequest:
            properties:
                resources:
                    items:
                        additionalProperties: true
                        type: object
                    type: array
            required:
                - resources
            type: object
        ApplyResult:
            properties:
                results:
                    items:
                        $ref: '#/components/schemas/ApplyResultItem'
                    type: array
            required:
                - results
            type: object
        ApplyResultItem:
            properties:
                action:
                    type: string
                error:
                    type: string
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                name:
                    type: string
            required:
                - kind
                - name
                - action
            type: object
        BlueGreenConfig:
            properties:
                ActiveVersion:
                    type: string
                AutoPromote:
                    type: boolean
                StandbyVersion:
                    type: string
            required:
                - ActiveVersion
                - StandbyVersion
                - AutoPromote
            type: object
        BootstrapConfig:
            properties:
                adminPort:
                    format: int32
                    minimum: 0
                    type: integer
                staticResources:
                    additionalProperties: true
                    type: object
                xdsClusterName:
                    type: string
            type: object
        CanaryConfig:
            properties:
                BaselineVersion:
                    type: string
                CanaryVersion:
                    type: string
                CanaryWeight:
                    format: int64
                    type: integer
                MatchCriteria:
                    $ref: '#/components/schemas/MatchCriteria'
            required:
                - BaselineVersion
                - CanaryVersion
                - CanaryWeight
            type: object
        Condition:
            properties:
                lastTransitionTime:
                    format: date-time
                    type: string
                message:
                    type: string
                reason:
                    type: string
                status:
                    type: string
                type:
                    type: string
            required:
                - type
                - status
                - lastTransitionTime
            type: object
        ConflictPolicy:
            enum:
                - strict
                - warn
                - takeover
            type: string
        DeleteResponse:
            properties:
                message:
                    type: string
            required:
                - message
            type: object
        DeployInstructions:
            properties:
                docker:
                    $ref: '#/components/schemas/DockerInstructions'
                gateway:
                    $ref: '#/components/schemas/GatewayInfo'
                kubernetes:
                    $ref: '#/components/schemas/K8sInstructions'
            required:
                - gateway
                - docker
                - kubernetes
            type: object
        DeploymentListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/DeploymentResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        DeploymentPutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/DeploymentSpec'
            required:
                - spec
            type: object
        DeploymentResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/DeploymentSpec'
                status:
                    $ref: '#/components/schemas/DeploymentStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        DeploymentSpec:
            properties:
                apiRef:
                    type: string
                environmentRef:
                    type: string
                gatewayRef:
                    type: string
                listenerRef:
                    type: string
                strategy:
                    $ref: '#/components/schemas/StrategyConfig'
            required:
                - apiRef
                - gatewayRef
                - listenerRef
                - environmentRef
            type: object
        DeploymentStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                phase:
                    type: string
                xdsSnapshotVersion:
                    type: string
            required:
                - phase
            type: object
        DeploymentStrategyConfig:
            properties:
                blue_green:
                    $ref: '#/components/schemas/BlueGreenConfig'
                canary:
                    $ref: '#/components/schemas/CanaryConfig'
                type:
                    type: string
            required:
                - type
            type: object
        DockerInstructions:
            properties:
                bootstrapUrl:
                    type: string
                composeSnippet:
                    type: string
                runCommand:
                    type: string
            required:
                - bootstrapUrl
                - runCommand
                - composeSnippet
            type: object
        EnvironmentListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/EnvironmentResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        EnvironmentPutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/EnvironmentSpec'
            required:
                - spec
            type: object
        EnvironmentResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/EnvironmentSpec'
                status:
                    $ref: '#/components/schemas/EnvironmentStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        EnvironmentSpec:
            properties:
                gatewayRef:
                    type: string
                hostname:
                    type: string
                httpFilters:
                    items:
                        $ref: '#/components/schemas/HTTPFilter'
                    type: array
                listenerRef:
                    type: string
            required:
                - gatewayRef
                - listenerRef
                - hostname
            type: object
        EnvironmentStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                phase:
                    type: string
            required:
                - phase
            type: object
        ErrorResponse:
            properties:
                code:
                    format: int64
                    type: integer
                details:
                    additionalProperties:
                        type: string
                    type: object
                error:
                    type: string
            required:
                - error
                - code
            type: object
        GatewayInfo:
            properties:
                envoyImage:
                    type: string
                name:
                    type: string
                nodeId:
                    type: string
                profile:
                    type: string
            required:
                - name
                - nodeId
                - envoyImage
            type: object
        GatewayListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/GatewayResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        GatewayProfileListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/GatewayProfileResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        GatewayProfilePutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/GatewayProfileSpec'
            required:
                - spec
            type: object
        GatewayProfileResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/GatewayProfileSpec'
                status:
                    $ref: '#/components/schemas/GatewayProfileStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        GatewayProfileSpec:
            properties:
                allowedPolicies:
                    items:
                        type: string
                    type: array
                bootstrap:
                    $ref: '#/components/schemas/BootstrapConfig'
                defaultHttpFilters:
                    items:
                        $ref: '#/components/schemas/HTTPFilter'
                    type: array
                defaultStrategy:
                    $ref: '#/components/schemas/StrategyConfig'
                description:
                    type: string
                displayName:
                    type: string
                envoyImage:
                    type: string
                listenerPresets:
                    items:
                        $ref: '#/components/schemas/ListenerPreset'
                    type: array
                profileType:
                    type: string
            required:
                - displayName
                - profileType
            type: object
        GatewayProfileStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                gatewayCount:
                    format: int64
                    type: integer
                phase:
                    type: string
            required:
                - phase
            type: object
        GatewayPutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/GatewaySpec'
            required:
                - spec
            type: object
        GatewayResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/GatewaySpec'
                status:
                    $ref: '#/components/schemas/GatewayStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        GatewaySpec:
            properties:
                defaults:
                    $ref: '#/components/schemas/StrategyConfig'
                nodeId:
                    type: string
                profileRef:
                    type: string
            required:
                - nodeId
            type: object
        GatewayStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                phase:
                    type: string
            required:
                - phase
            type: object
        HTTPFilter:
            properties:
                config:
                    additionalProperties: true
                    type: object
                name:
                    type: string
            required:
                - name
                - config
            type: object
        HealthCheckConfig:
            properties:
                enabled:
                    type: boolean
                expected_status:
                    format: int32
                    minimum: 0
                    type: integer
                healthy_count:
                    format: int32
                    minimum: 0
                    type: integer
                interval:
                    type: string
                path:
                    type: string
                timeout:
                    type: string
                unhealthy_count:
                    format: int32
                    minimum: 0
                    type: integer
            required:
                - enabled
            type: object
        HealthResponse:
            properties:
                status:
                    type: string
                timestamp:
                    format: date-time
                    type: string
                uptime:
                    type: string
                version:
                    type: string
            required:
                - status
                - timestamp
                - version
                - uptime
            type: object
        K8sInstructions:
            properties:
                applyCommand:
                    type: string
                manifest:
                    type: string
            required:
                - manifest
                - applyCommand
            type: object
        ListenerListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/ListenerResponse'
                    type: array
                kind:
                    type: string
                total:
                    type: integer
            required:
                - kind
                - items
                - total
            type: object
        ListenerPreset:
            properties:
                address:
                    type: string
                http2:
                    type: boolean
                name:
                    type: string
                port:
                    format: int32
                    minimum: 0
                    type: integer
                tls:
                    $ref: '#/components/schemas/TLSConfig'
            required:
                - name
                - port
            type: object
        ListenerPutRequest:
            properties:
                metadata:
                    properties:
                        conflictPolicy:
                            $ref: '#/components/schemas/ConflictPolicy'
                        labels:
                            additionalProperties:
                                type: string
                            type: object
                    type: object
                spec:
                    $ref: '#/components/schemas/ListenerSpec'
            required:
                - spec
            type: object
        ListenerResponse:
            properties:
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                metadata:
                    $ref: '#/components/schemas/ResourceMeta'
                spec:
                    $ref: '#/components/schemas/ListenerSpec'
                status:
                    $ref: '#/components/schemas/ListenerStatus'
            required:
                - kind
                - metadata
                - spec
            type: object
        ListenerSpec:
            properties:
                address:
                    type: string
                gatewayRef:
                    type: string
                http2:
                    type: boolean
                port:
                    format: int32
                    minimum: 0
                    type: integer
                tls:
                    $ref: '#/components/schemas/TLSConfig'
            required:
                - gatewayRef
                - port
            type: object
        ListenerStatus:
            properties:
                conditions:
                    items:
                        $ref: '#/components/schemas/Condition'
                    type: array
                phase:
                    type: string
            required:
                - phase
            type: object
        LoadBalancingStrategyConfig:
            properties:
                choice_count:
                    format: int32
                    minimum: 0
                    type: integer
                cookie_name:
                    type: string
                hash_on:
                    type: string
                header_name:
                    type: string
                health_check:
                    $ref: '#/components/schemas/HealthCheckConfig'
                type:
                    type: string
            required:
                - type
            type: object
        MatchCriteria:
            properties:
                Headers:
                    additionalProperties:
                        type: string
                    type: object
                QueryParams:
                    additionalProperties:
                        type: string
                    type: object
                SourceLabels:
                    additionalProperties:
                        type: string
                    type: object
            required:
                - Headers
                - QueryParams
                - SourceLabels
            type: object
        MetricsConfig:
            properties:
                enabled:
                    type: boolean
                path:
                    type: string
                port:
                    format: int32
                    minimum: 0
                    type: integer
                provider:
                    type: string
            required:
                - enabled
            type: object
        ObservabilityStrategyConfig:
            properties:
                access_logs:
                    $ref: '#/components/schemas/AccessLogsConfig'
                metrics:
                    $ref: '#/components/schemas/MetricsConfig'
                tracing:
                    $ref: '#/components/schemas/TracingConfig'
            type: object
        ParsedInfo:
            properties:
                paths:
                    items:
                        type: string
                    type: array
                servers:
                    items:
                        type: string
                    type: array
                title:
                    type: string
                version:
                    type: string
            type: object
        PolicyInstance:
            properties:
                config:
                    additionalProperties: true
                    type: object
                enabled:
                    type: boolean
                id:
                    type: string
                inheritanceMode:
                    type: string
                order:
                    format: int64
                    type: integer
                policyType:
                    type: string
            required:
                - id
                - policyType
                - order
                - enabled
            type: object
        RateLimitStrategyConfig:
            properties:
                burst_size:
                    format: int32
                    minimum: 0
                    type: integer
                claim_name:
                    type: string
                cookie_name:
                    type: string
                external_service:
                    type: string
                header_name:
                    type: string
                identify_by:
                    type: string
                requests_per_minute:
                    format: int32
                    minimum: 0
                    type: integer
                type:
                    type: string
            required:
                - type
            type: object
        ResourceKind:
            enum:
                - Gateway
                - GatewayProfile
                - Listener
                - Environment
                - API
                - Deployment
            type: string
        ResourceMeta:
            properties:
                conflictPolicy:
                    $ref: '#/components/schemas/ConflictPolicy'
                createdAt:
                    format: date-time
                    type: string
                kind:
                    $ref: '#/components/schemas/ResourceKind'
                labels:
                    additionalProperties:
                        type: string
                    type: object
                managedBy:
                    type: string
                name:
                    type: string
                revision:
                    format: int64
                    type: integer
                updatedAt:
                    format: date-time
                    type: string
            required:
                - kind
                - name
                - revision
                - createdAt
                - updatedAt
            type: object
        RetryStrategyConfig:
            properties:
                budget_percent:
                    format: double
                    type: number
                max_retries:
                    format: int32
                    minimum: 0
                    type: integer
                per_try_timeout:
                    type: string
                retriable_status_codes:
                    items:
                        format: int32
                        minimum: 0
                        type: integer
                    type: array
                retry_on:
                    type: string
                type:
                    type: string
            required:
                - type
            type: object
        RouteMatchStrategyConfig:
            properties:
                case_sensitive:
                    type: boolean
                type:
                    type: string
                version_header:
                    type: string
            required:
                - type
            type: object
        RoutingConfig:
            properties:
                caseSensitive:
                    type: boolean
                loadBalancing:
                    type: string
                matchType:
                    type: string
            type: object
        StrategyConfig:
            properties:
                deployment:
                    $ref: '#/components/schemas/DeploymentStrategyConfig'
                load_balancing:
                    $ref: '#/components/schemas/LoadBalancingStrategyConfig'
                observability:
                    $ref: '#/components/schemas/ObservabilityStrategyConfig'
                rate_limiting:
                    $ref: '#/components/schemas/RateLimitStrategyConfig'
                retry:
                    $ref: '#/components/schemas/RetryStrategyConfig'
                route_matching:
                    $ref: '#/components/schemas/RouteMatchStrategyConfig'
            type: object
        TLSConfig:
            properties:
                caPath:
                    type: string
                certPath:
                    type: string
                cipherSuites:
                    items:
                        type: string
                    type: array
                keyPath:
                    type: string
                minVersion:
                    type: string
                requireClientCert:
                    type: boolean
            required:
                - certPath
                - keyPath
            type: object
        TracingConfig:
            properties:
                enabled:
                    type: boolean
                endpoint:
                    type: string
                provider:
                    type: string
                sampling_rate:
                    format: double
                    type: number
            required:
                - enabled
            type: object
        UpstreamConfig:
            properties:
                host:
                    type: string
                port:
                    format: int32
                    minimum: 0
                    type: integer
                scheme:
                    type: string
                timeout:
                    type: string
            required:
                - host
                - port
            type: object
info:
    description: Declarative Envoy xDS control plane with reconciliation-based architecture. Resources (Gateways, Listeners, Environments, APIs, Deployments) are declared via this REST API and stored in a desired-state store.
    license:
        name: Apache 2.0
    title: FlowC Control Plane API
    version: 3.0.0
openapi: 3.0.3
paths:
    /api/v1/apis:
        get:
            operationId: listAPIs
            parameters:
                - description: Label filter (comma-separated key=value pairs)
                  in: query
                  name: labels
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIListResponse'
                    description: List of apis
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
            summary: List apis
            tags:
                - APIs
    /api/v1/apis/{name}:
        delete:
            operationId: deleteAPI
            parameters:
                - description: Resource revision for optimistic concurrency control
                  in: header
                  name: If-Match
                  schema:
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeleteResponse'
                    description: Resource deleted
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
            summary: Delete a API
            tags:
                - APIs
        get:
            operationId: getAPI
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIResponse'
                    description: The API resource
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
            summary: Get a API
            tags:
                - APIs
        parameters:
            - description: Resource name
              in: path
              name: name
              required: true
              schema:
                type: string
        put:
            operationId: putAPI
            parameters:
                - description: Resource revision for optimistic concurrency control
                  in: header
                  name: If-Match
                  schema:
                    format: int64
                    type: integer
                - description: Identifier of the managing entity for ownership tracking
                  in: header
                  name: X-Managed-By
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/APIPutRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIResponse'
                    description: Resource updated
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIResponse'
                    description: Resource created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
            summary: Create or update a API
            tags:
                - APIs
    /api/v1/apply:
        post:
            description: Creates or updates multiple resources in a single request.
            operationId: applyResources
            parameters:
                - description: Identifier of the managing entity for ownership tracking
                  in: header
                  name: X-Managed-By
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ApplyRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApplyResult'
                    description: Apply results
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Error response
            summary: Bulk apply resources
            tags:
                - Apply
    /api/v1/deployments:
        get:
